<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>City General Hospital | Care You Can Trust</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo"><a href="index.html">CITY<span>HEALTH</span></a></div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="Find%20a%20Doctor.html">Find a Doctor</a></li>
            <li><a href="Services.html">Services</a></li>
            <li><a href="Locations.html">Locations</a></li>
            <li><a href="PatientPortal.html" class="btn-portal">Patient Portal</a></li>
        </ul>
    </nav>

    <header class="hero">
        <div class="hero-overlay">
            <h1>Your Health, Our Priority.</h1>
            <p>Providing world-class medical expertise with a human touch.</p>
            
            <div class="search-container">
                <input type="text" placeholder="Search doctors, specialties, or symptoms...">
                <button type="submit"><i class="fas fa-search"></i> Search</button>
            </div>
        </div>
    </header>

    <section class="action-grid">
        <div class="card emergency">
            <i class="fas fa-clock"></i>
            <h3>ER Wait Time</h3>
            <p class="wait-time">12 Minutes</p>
            <small>Current Average</small>
        </div>
        <div class="card">
            <i class="fas fa-calendar-check"></i>
            <h3>Appointments</h3>
            <p>Book your visit online</p>
            <button class="card-btn">Schedule Now</button>
        </div>
        <div class="card">
            <i class="fas fa-map-marker-alt"></i>
            <h3>Find Us</h3>
            <p>12 locations near you</p>
            <button class="card-btn">View Map</button>
        </div>
    </section>

</body>
</html>
